name: cad_cleaner
description: A Flutter desktop application to safely uninstall AutoCAD from Windows.
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Running and managing external processes (PowerShell, taskkill).
  process: ^5.0.0

  # @protected on the CadService logging hook.
  meta: ^1.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
