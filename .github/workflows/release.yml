name: Release

# The tag is the trigger and the source of truth for the version.
# Push a v*.*.* tag (the pre-push hook can create one for you) and this builds
# the Windows executable and publishes a GitHub Release with generated notes.
on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  # Manual re-run of an existing tag, e.g. after a transient CI failure.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.44.6'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          # Full history so release notes can diff against the previous tag.
          fetch-depth: 0

      - name: Resolve version from the tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ inputs.tag || github.ref_name }}"
          version="${tag#v}"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $tag (version $version)"

      - name: Verify pubspec.yaml matches the tag
        shell: bash
        run: |
          set -euo pipefail

          current=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          name="${current%%+*}"

          if [ "$name" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} does not match pubspec version $name."
            echo "Bump pubspec.yaml and re-tag so the two agree."
            exit 1
          fi
          echo "pubspec version $name matches the tag."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows executable
        run: flutter build windows --release

      - name: Verify CadService.exe was produced
        shell: bash
        run: |
          set -euo pipefail
          exe="build/windows/x64/runner/Release/CadService.exe"
          if [ ! -f "$exe" ]; then
            echo "::error::Expected $exe was not produced."
            ls -R build/windows/x64/runner/Release || true
            exit 1
          fi
          echo "Built $exe"

      - name: Build single-file installer
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=${{ steps.version.outputs.version }}" `
            "windows\installer.iss"

      - name: Package the portable bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path "build\windows\x64\runner\Release\*" `
            -DestinationPath "dist\CadService-windows-x64-${{ steps.version.outputs.tag }}.zip" `
            -Force
          Rename-Item `
            -Path "dist\CadService-Setup.exe" `
            -NewName "CadService-Setup-${{ steps.version.outputs.tag }}.exe"
          Get-ChildItem dist

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          previous=$(git describe --tags --abbrev=0 "$tag^" 2>/dev/null || true)

          {
            if [ -n "$previous" ]; then
              echo "## Changes since $previous"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$previous..$tag"
            else
              echo "## Initial release"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "$tag"
            fi
            echo
            echo
            echo "## Downloads"
            echo
            # printf with a single-quoted format: backticks stay literal, and
            # only %s is substituted.
            echo '| File | Use it when |'
            echo '| --- | --- |'
            printf '| `CadService-Setup-%s.exe` | Recommended. One-click installer; adds Start Menu and desktop shortcuts. |\n' "$tag"
            printf '| `CadService-windows-x64-%s.zip` | Portable. Unzip and run `CadService.exe` from inside the folder. |\n' "$tag"
            echo
            # printf '%s\n' with single-quoted args: no shell interpretation of
            # backticks or backslashes, and no heredoc indentation to get wrong
            # inside a YAML block scalar.
            printf '%s\n' \
              '> `CadService.exe` is not standalone — it needs the DLLs and the' \
              '> `data\` folder shipped alongside it, so run it from the installed' \
              '> or unzipped folder rather than on its own.' \
              '' \
              '## Requirements' \
              '' \
              '- Windows 10 or later (x64)' \
              '- Administrator privileges (the wizard removes program files and registry keys)'
            echo
            echo "Built with Flutter ${{ env.FLUTTER_VERSION }}."
          } > release-notes.md

          cat release-notes.md

      - name: Publish the GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "CAD Cleaner ${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            "dist/CadService-Setup-${{ steps.version.outputs.tag }}.exe" \
            "dist/CadService-windows-x64-${{ steps.version.outputs.tag }}.zip"
